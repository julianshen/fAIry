name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ts:
    name: ts (${{ matrix.package }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        package: [extension, pi-daemon, agent-panel]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.10"
      - run: bun install --frozen-lockfile
      - run: bun run lint
        working-directory: packages/${{ matrix.package }}
      - run: bun run typecheck
        working-directory: packages/${{ matrix.package }}
      - run: bun run test
        working-directory: packages/${{ matrix.package }}

  scripts:
    name: shell-script tests + actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - run: bash packages/mac-shell/scripts/release-lib.test.sh
      - run: bash packages/mac-shell/scripts/appcast-wiring.test.sh
      - name: actionlint
        run: |
          bash <(curl -sSL https://raw.githubusercontent.com/rhysd/actionlint/v1.7.7/scripts/download-actionlint.bash) 1.7.7
          ./actionlint -color

  swift:
    name: swift test (mac-shell)
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/cache@v4
        with:
          path: packages/mac-shell/.build
          key: spm-${{ runner.os }}-${{ hashFiles('packages/mac-shell/Package.resolved') }}
      - run: swift test
        working-directory: packages/mac-shell

  e2e:
    name: e2e happy path (tools.spec)
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.10"
      - run: bun install --frozen-lockfile
      - name: Install Playwright Chromium
        run: bunx playwright install chromium
        working-directory: packages/extension
      - name: Build the extension
        run: bun run build
        working-directory: packages/extension
      - name: Run the deterministic e2e (self-skips if the MV3 extension can't side-load)
        run: bunx playwright test e2e/tools.spec.ts
        working-directory: packages/extension
