name: Release

on:
  push:
    tags: ["v[0-9]*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"
      - run: bun install --frozen-lockfile

      - name: Derive the version from the tag
        run: |
          source packages/mac-shell/scripts/release-lib.sh
          echo "FAIRY_VERSION=$(version_from_tag "$GITHUB_REF_NAME")" >> "$GITHUB_ENV"

      - name: Import the Developer ID certificate into an ephemeral keychain
        env:
          P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/fairy-ci.keychain-db"
          KEYCHAIN_PW="$(openssl rand -hex 16)"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          printf '%s' "$P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$P12_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          rm "$RUNNER_TEMP/cert.p12"
          # Allow codesign to use the key non-interactively.
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db

      - name: Store the notarytool credentials (App Store Connect API key)
        env:
          P8_BASE64: ${{ secrets.NOTARY_API_KEY_P8_BASE64 }}
          KEY_ID: ${{ secrets.NOTARY_API_KEY_ID }}
          ISSUER: ${{ secrets.NOTARY_API_ISSUER }}
        run: |
          printf '%s' "$P8_BASE64" | base64 --decode > "$RUNNER_TEMP/notary-key.p8"
          xcrun notarytool store-credentials fairy-ci-notary \
            --key "$RUNNER_TEMP/notary-key.p8" --key-id "$KEY_ID" --issuer "$ISSUER"
          rm "$RUNNER_TEMP/notary-key.p8"

      - name: Write the Sparkle EdDSA private key
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          [ -n "$SPARKLE_PRIVATE_KEY" ] || { echo "SPARKLE_PRIVATE_KEY secret is empty" >&2; exit 1; }
          printf '%s' "$SPARKLE_PRIVATE_KEY" > "$RUNNER_TEMP/sparkle_ed25519"
          chmod 600 "$RUNNER_TEMP/sparkle_ed25519"
          echo "FAIRY_SPARKLE_PRIVATE_KEY_FILE=$RUNNER_TEMP/sparkle_ed25519" >> "$GITHUB_ENV"

      - name: Build, sign, notarize, package (release.sh)
        env:
          DEVELOPER_ID_APP: ${{ secrets.MACOS_SIGN_IDENTITY }}
          NOTARY_PROFILE: fairy-ci-notary
          FAIRY_SPARKLE_PUBLIC_KEY: ${{ vars.FAIRY_SPARKLE_PUBLIC_KEY }}
          FAIRY_UPDATE_FEED_URL: https://github.com/${{ github.repository }}/releases/latest/download/appcast.xml
          FAIRY_DOWNLOAD_URL_PREFIX: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/
        run: bash packages/mac-shell/scripts/release.sh

      - name: Publish the GitHub Release (DMG + appcast)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DIST=packages/mac-shell/dist
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" --clobber \
              "$DIST/Fairy-$FAIRY_VERSION.dmg" "$DIST/appcast.xml"
          else
            gh release create "$GITHUB_REF_NAME" \
              --title "Fairy $FAIRY_VERSION" --generate-notes \
              "$DIST/Fairy-$FAIRY_VERSION.dmg" "$DIST/appcast.xml"
          fi
